front:
  text: 化書目録冠二
  hash: sha256:38536393391ccde9ad2712199d406fe634bbb3f141e03ccc3616dcd9d4f0f7cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0047_HFL_000-001a, image: hfl/1107/1107-016.png}
body:
  text: 道化卷第一蛇雀老楓耳目環舞鉛丹形影蟄藏梟鷄四鏡射虎龍虎游雲噦嚥大化正一天地稚子陽燧死生爪髮神道神交大含術化卷第二雲龍猛虎用神水竇魍魎虛無虛實狐狸轉舟心變珠玉蠮螉胡夫隂陽海魚礀松動靜聲氣大同帝師琥珀德化卷第三五常飛蛾異心弓矢聦眀有國黄雀籠猿常道感喜太醫讒語刻畫酒醴恩賞養民仁化卷第四得一五行畋漁犧牲太和海魚神弓救物書道鳳鴟知人螻蟻歌舞躑躅止鬭象符善惡食化卷第五七奪巫像養馬絲綸奢僣燔骨食迷戰欲膠竿庚辛興亡雀鼠無爲王者鴟鳶儉化卷第六太平權衡禮道食象民情慳號君民乳童化柄御一三皇天牧雕籠禮要清靜損益解惑
  hash: sha256:0cf98145baecaceb6b4c3ec247bf8dc70fc79ac1ebb27361a69fc6c3a0ec914a
