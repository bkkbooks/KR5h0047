front:
  text: 化書卷之三
  hash: sha256:b89b464e4e581d8835e6b31aa222c0f231b2e0cf8a7e4f8116eeff2a5236251e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0047_HFL_003-001a, image: hfl/1107/1107-056.png}
body:
  text: 紫霄真人譚景昇譔德化五帝儒有講五常之道者分之爲五事屬之爲五行散之爲五色化之爲五聲俯之爲五嶽仰之爲五星物之爲五金族之爲五靈配之爲五味感之爲五情所以聽之者若醯雞之遊太虛如井蛙之浮滄溟莫見其鴻濛之渥莫測其浩渺之程日暮途遠無不倒行殊不知五常之道一也忘其名則得其理忘其理則得其情然後牧之以清靜棲之以杳冥使混我神氣符我心靈若水投水不分其清若火投火不間其明是謂奪五行之英盜五常之精聚之則一芥可飽散之則萬機齊亨其用事也如酌醴以投器其應物也如懸鏡以鑑形於是乎變之爲萬象化之爲萬生通之爲隂陽虛之爲神明所以運帝王之籌策代天地之權衡則仲尼其人也飛蛾天下賢愚營營然若飛蛾之投夜燭蒼蠅之觸曉窗知徃而不知返知進而不知退而但知避害而就利不知聚利而就害夫賢於人而不賢於身何賢之謂也愽於物而不愽於己何愽之謂也是以大人利害俱亡何徃不臧異心虎踞於林蛇遊於澤非鴟鳶之讎鴟鳶從而號之以其蓄異心之故也是故麟有利角衆獸不伏鳳有利觜衆鳥不賔君有竒智天下不臣善馳者終於蹶善鬥者終於敗有數則終有智則窮巧者爲不巧者所使詐者爲不詐者所理弓矢天子作弓矢以威天下天下盜弓矢以侮天子君子作禮樂以防小人小人盜禮樂以僭君子有國者好聚歛蓄粟帛其甲兵以禦賊盜賊盜擅甲兵踞一作據粟帛以奪其國或曰安危德也又曰興亡數也苟德可以恃何必廣粟帛乎句數可以憑何必廣甲兵乎聦明無所不能者有大不能無所不知者有大不知夫忘弓矢然後知射之道忘䇿轡然後知馭之道忘弦匏然後知樂之道忘智慮然後知大人之道是以天下之主道德出於人理國之主仁義出於人亡國之主聦明出於人有國有國之禮享郊廟敬鬼神也亹尾一作亹龜策占吉㐫也敬鬼神信禍福之職也占吉凶信興以之數也奈何有大不信窮民之力以爲城郭奪民之食以爲儲蓄是福可以力取是亡可以力敵是疑貳於鬼神是欺惑於龜策是不信於天下之人斯道也賞不足勸罰不足懼國不足守黄雀黄雀之爲物也日遊於庭日親於人而常畏之而人常撓之玄烏之爲物也時遊於户時親於人而不畏人而人不撓之彼行促促此行佯佯彼鳴啾啾此鳴鏘鏘彼視矍矍此視汪汪彼心慼慼此心堂堂是故疑人者爲人所疑防人者爲人所防君子之道仁與義中與正何憂何害籠猿籠中之猿踴躍萬變不能出於籠匣中之虎狂怒萬變不能出於匣小人之機智慮萬變不能出於大人之道夫大人之道如地之負如天之垂無日不怨無人不欺怨不我怒欺不我夷然後萬物知其所歸常道仁義者常行之道行之不得其術以至於亡國忠信者常用之道用之不得其術以至於獲罪廉潔者常守之道守之不得其術以至於暴民材辯者常御之道御之不得其術以至於罹祻蓋拙在用於人巧在用於身使民親稼則怨誡民輕食則怒夫餌者魚之嗜羶者蟻之慕以餌投魚魚必懼以羶投蟻蟻必去由不得化之道感喜感父之慈非孝也喜君之寵非忠也感始於不感喜始於不喜多感必多怨多喜必多怒感喜在心由物之有毒田蓬之藏火不可不慮是以君子之業爵之不貴禮之不下親之不知䟽之不疑辱之不得何感喜之有太醫太醫之道脉和而實者爲君子生之道也撓而浮者爲小人死之道也太卜之道策平而慢者爲君子吉之道也曲而利者爲小人凶之道也以是論之天下之理一也是故觀其國則知其臣觀其臣則知其君觀其君則知興亡臣可以擇君而仕君可以擇臣而任夫揖讓可作而噪靜不可作衣冠可詐而形器不可詐言語可文而聲音不可文䜛語藏於人者謂之機竒於人者謂之謀殊不知道德之機衆人所知仁義之謀衆人所無是故有賞罰之教則巿道進有親踈之分則小人入夫棄金於市盜不敢取詢政於朝讒不敢語天下之至公也刻畫畫者不敢易於圖像苟易之必有咎刻者不敢侮於本偶苟侮之必貽祻始製作於我又要敬于我又寘禍於我是故張機者用於機設險者死于險建功者辱于功立法者罹於法動一竅則百竅相會舉一事則萬事有害所以揖貴乎明險貴乎平功貴乎無狀法貴乎無像能出刻畫者可以名之爲大象酒醴夫酒醴者迫之飮愈不飮恕之飮愈欲飮是故抑人者人抑之容人者人容之貸其死者樂其死貸其輸者樂其輸所以民盜君之德君盜民之力能知反復之道者可以居兆民之職恩賞侯者人所貴金者人所重衆人封公而得侯者不美衆人分玉而得金者不樂是故賞不可妄行恩不可妄施其當也由爲爭奪之漸其不當也即爲亂亡之基故我自卑則賞不能大我自儉則恩不得竒歷觀亂亡之史皆驕侈恩賞之所以爲也養民民不怨火而怨使之禁火民不怨盜而怨使之防盜是故濟民不如不濟愛民不如不愛天有雨露所以招其怨神愛禱祝所以招其謗夫禁民火不如禁心火防人盜不如防我盜其養民也如是化書卷之三
