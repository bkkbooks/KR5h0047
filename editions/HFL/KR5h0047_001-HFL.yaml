front:
  text: 化書卷之一
  hash: sha256:fbd6afe1c7cb926eef2d9ef45a6a57d4a22a3eafbfdbdedda9d56f9b579a3355
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0047_HFL_001-001a, image: hfl/1107/1107-020.png}
body:
  text: 紫霄真人譚景昇譔道化紫極宫碑道之委也虛化神神化氣氣化形形生而萬物所以塞也道之用也形化氣氣化神神化虛虛明而萬物所以通也是以古聖人窮通塞之端得造化之源忘形以飬氣忘氣以養神忘神以飬虛虛實相通是謂大同故藏之爲元精用之爲萬靈含之爲太乙放之爲太清是以坎離消長於一身風雲發泄於七竅真氣熏蒸而時無寒暑純陽注注而民無死生是謂神化之道者也蛇雀蛇化爲龜雀化爲蛤彼忽然忘曲屈之狀而得蹣盤跚蘇干切之質此倐然失飛鳴之態而得介甲之體斷削不能加其功繩尺不能定其象何化之速也且夫當空團塊見鬼而不見空粉塊求空見空而不見塊形無妨而人自妨之物無滯而人自滯之悲哉老楓老楓化爲羽人朽麥化爲蝴蝶自無情而之有情也賢女化爲貞石山蚯化爲百合自有情而之無情也是故土木金石皆有情性精魄虛無所不至神無所不通氣無所不同形無所不類孰爲彼孰爲我孰爲有識孰爲無識萬物一物也萬神一神也斯道之至矣耳目目所不見設明鏡而見之耳所不聞設虛氣而聞之精神在我視聽在彼跰部田切趾可以割陷吻可以補則是耳目可以妄設形容可以僞置既假又假既惑又惑所以知䰟𩲸魅我血氣醉我十竅囚我五根役我惟神之有形由形之有疣苟無其疣何所不可環舞作環舞者宫室皆轉瞰迴流者頭目自旋非宫室之幻惑也而人自惑之非迴流之改變也而人自變之是故粉巾爲兔藥石爲馬而人不疑甘言巧笑圖臉畫眉而人不知唯清靜者物不能欺鉛丹術有火鍊鉛丹以代穀食者其必然也然歲豐則能飽歲儉則能飢是非丹之恩蓋由人之誠也則是我本不饑而自饑之丹本不飽而自飽之饑者大忘飽者大幻蓋不齊其道也故人能一有無一死生一情性一内外則可以蛻五行脫三光何患乎一日百食何慮乎百日一食形影以一鏡照形以餘鏡照影鏡鏡相照影影相傳不變冠劒之狀不奪黼黻之色是形也與影無殊是影也與形無異乃知形以非實影以非虛無實無虛可與道俱蟄藏物有善於蟄藏者或可以禦大寒或可以去大饑或可以萬歲不死以其心冥冥兮無所知神怡怡兮無所之氣熙熙兮無所爲萬慮不能惑求死不可得是以大人體物知身體身知神體神知眞是謂吉人之津梟鷄梟夜明而晝昏雞晝明而夜昏其異同也如是或謂梟爲異則謂雞爲同或謂雞爲異則謂梟爲同孰梟雞之異晝夜乎晝夜之異梟雞乎孰晝夜之同梟雞乎梟之同晝夜乎夫耳中磬我自聞目中花我自見我之晝夜彼之晝夜則是晝不得謂之明夜不得謂之昏能齊昏明者其爲大人乎四鏡小人常有四鏡一名圭一名珠一名砥一名盂圭視者大珠視者小砥視者正盂視者倒觀彼之器察我之形由是無大小無短長無妍醜無美惡所以知形氣謟我精魄賊我奸臣貴我禮樂尊我是故心不得爲君王不得爲之主戒之如火防之如虎純儉不可襲清靜不可侮然後可以跡容廣而躋三五射虎射似虎者見虎而不見石斬暴蛟者見蛟而不見水是知萬物可以虛我身可以無以我之無合彼之虛自然可以隱可以顯可以死可以生而無所拘夫空中之塵若飛雪而目未嘗見穴中之蟻若牛斗而耳未嘗聞况非見聞者乎龍虎龍化虎變可以蹈虛空虛空非無也可以貫金石金石非有也有無相通物我相同其生非始其化非終知此道者形不可斃神不可得逝游雲游雲無質故五色含焉明鏡無瑕故萬物象焉謂水之含天也必天含水也夫百步之外鏡則見人人不見影斯爲驗也是知太虛之中無所不有萬躍之内無所不見而世人且知心仰寥廓而不知跡處虛空寥廓無所間神明且不遠是以君子常正其心常儼其容則可以游泳於寥廓交友於神明而無咎也噦嚥有言臭腐之狀則輒有所噦聞珍羞之名則妄有所嚥臭腐了然虛珍羞必然無而噦不能止嚥不能己有懼菽醬若蝤蠐者有愛鮑魚若鳳膏者知此理者可以齊奢儉外榮辱黜是非忘祻福大化虛化神神化氣氣化形形化精精化顧盻而顧盻化揖讓揖讓化陞降陞降化尊卑尊卑化分别分别化冠冕冠冕化車輅車輅化宫室宫室化掖衛掖衛化燕享燕享化奢蕩奢蕩化聚歛聚歛化欺罔欺罔化刑戮刑戮化悖亂悖亂化甲兵甲兵化爭奪爭奪化敗亡其來也勢不可遏其去也力不可拔是以大人以道德游泳之以仁義漁獵之以刑禮籠罩之蓋保其國家而護其富貴也故道德有所不實仁義有所不至刑禮有所不足是教民爲奸詐使民爲淫邪化民爲悖逆驅民爲盜賊上昏昏然不知其弊下恍恍然不知其病其何以救之哉正一世人皆知莧葅可以剖鼈而不知朱草可以剖人小人由是知神可以分氣可以泮形可以散散而爲萬不謂不足聚而爲一不謂有餘若狂風飄髮魂魄夢飛屐齒斷蚓首尾皆動夫何故太虛一虛也太神一神也太氣一氣也太形一形也命之則由根之則一守之不得舍之不失是謂正一天地天地盜太虛生人蟲盜天地生𧕍虰營丁盜人蟲生𧕍虰者腸中之蟲也摶我精氣鑠灼我魂魄盜我滋味而有其生有以見我之必死所以知天之必頽天其頽乎我將安有我其死乎𧕍虰將安守所謂奸臣盜國國破則家亡蠧䖝蝕木木盡則䖝死是以大人録精氣藏魂魄薄滋味禁嗜慾外富貴雖天地老而我不傾𧕍虰死而我長生奸臣去而國太平稚子稚子美影不知爲影所美狂夫侮像不知爲像所侮化家者不知爲家所化化國者不知爲國所化化天下者不知爲天下所化三皇有道者也不知其道化爲五帝之德五帝有德者也不知其德化爲三王之仁義三王有仁義者也不知其仁義化爲秦漢之戰爭醉者負醉疥者療疥其勢彌顛其病彌而無反者也陽燧陽燧召火方諸召水感激之道斯不遠矣高視者强低視者賊斜視者狡平視者仁張視者怨細視者佞遠視者智近視者拙外視者昏内視者明是故載我者身用我者神用神合眞可以長存死生虛化神神化氣氣化血血化形形化嬰嬰化童童化少少化壯壯化老老化死死復化爲虛虛復化爲神神復化爲氣氣復化爲物化化不間由環之無窮夫萬物非不欲生不得不生萬物非欲死不得不死達此理者虛而乳之神可以不化形可以不生爪髮爪髮者我之形何爪可割而無害髮可截而無痛蓋榮衛所不至也則是我本無害而筋骨爲之害我本無痛而血肉爲之痛所以知喜怒非我作哀樂非我動我爲形所昧形爲我所愛達此理者可以出生死之外神道太上者虛無之神也天地者隂陽之神也人蟲者血肉之神也其同者神其異者形是故形不靈而氣靈語不靈而聲靈覺不靈爭而夢靈生不靈而死靈水至清而結冰不清神至明而結形不明氷泮返清形散返明能知真死者可以游太上之京神交牝牡之道龜龜相顧神交也鶴鶴相唳氣交也蓋由情愛相接所以神氣可交也是故大人大其道以合天地廓其心以符至真融其氣以生萬物和其神以接兆民我心熙熙民心怡怡心怡怡兮不知其所思形惚惚兮不知其所爲若一氣之和合若一神之混同若一聲之哀樂若一形之窮通安用旌旗安用金鼓安用賞罰安用行伍斯可以將天下之兵滅天下之敵是謂神交之道也大含虛化神神化氣氣化形形氣相乘而成聲耳非聽聲也而聲自投之谷非應響也而響自滿之耳小竅也谷大竅也山澤小谷也天地大谷也一竅鳴萬竅皆鳴一谷聞萬谷皆聞聲導氣氣導神神導虛虛含神神含氣氣含聲相導相含雖秋蚊之翾翾許縁切蒼蠅之營營無所不至也由此知之雖絲毫之慮必有所察雖啾嚓之言必有所聞唯大人之機天地莫能見隂陽莫能知鬼神莫能窺夫何故道德仁義之所爲化書卷之一
