front:
  text: 化書卷之二
  hash: sha256:6345cfaffc845e812e7a4d4ebbb7e24fe94113c9e2af03adf89efa0d356013c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0047_HFL_002-001a, image: hfl/1107/1107-040.png}
body:
  text: 術化雲龍雲龍風虎得神氣之道者也神由母也氣由子也以神召氣以母召子孰敢不至也夫蕩穢者必召五帝之氣苟召不至穢何以蕩伏虺者必役五星之精苟役不至虺何以伏小人由是知隂陽可以作風雲可以會山陵可以拔江海可以發然用之於外不如守之於内然後用之於外則無所不可猛虎猛虎行章木偃毒鴆怒土石揭威之所鑠氣之所搏頑器爲之作山人由是知鋏可使之飛山河可使之移萬物可使之相隨夫神全則威大精全則氣雄萬惑不能溺萬物可以役是故一人所以能敵萬人者非弓刀之技蓋威之至也一人所以能悅萬人者非言笑之惠蓋和之至也用神蟲之無足蛇能屈曲蛭能倒蹙蝸牛能蓄縮小人所以見其機由是得其師可以坐致萬里而不馳是故足行者有所不達翼飛者有所不至目視者有所不見耳聴者有所不聞夫何故彼知形而不知神此知神而不知形以形用神則亡以神用形則康水𥩐水竇可以下溺杵糠可以療噎斯物也始製於人又復用於人法本無祖術本無狀師之於心得之於象隂爲陽所伏男爲女所制剛爲柔所剋智爲愚所得以是用之則鐘鼓可使之啞車轂可使之鬥妻子可使之改易君臣可使之離合萬物本虛萬法本無得虛無之竅者知法術之要乎魍魎魍魎附巫祭一本作癸言禍福事每來則飮食言語皆神每去則飲食言語皆人不知魍魎之附巫祭也不知巫祭之附魍魎也小人由是知心可以交氣可以易神可以奪魄可以録形爲神之宫神爲形之容以是論之何所不可虛無鬼之神可以禦龍之變可以役蛇虺可以不能螫戈矛不能擊唯無心者火不能燒水不能溺兵刃不能加天命不能死其何故志於樂者猶忘飢志於憂者猶忘痛志於虛無者可以忘生死虛實方咫之木置於地之上使人蹈之而有餘方尺之木置於竿之端使人踞之而不足非物有小大蓋心有虛實是故冒大暑而撓者愈熱受炙灼而懼者愈痛人無常心物無常性小人由是知水可使不濕火可使不燥狐狸狐狸之怪雀鼠之魅不能幻明鏡之鑒者明鏡無心之故也是以虛空無心而無所不知昊天無心而萬象自馳行師無狀而敵不敢欺大人無慮而元精自歸能師於無者無所不之轉舟轉萬斛之舟者由一尋之木發千鈞之弩者由一寸之機一目可以觀大天一人可以君兆民太虛茫茫而有涯太上浩浩而有家得天地之綱知隂陽之房見精神之藏則數可以奪命可以活天地可以反覆心變至婬者化爲婦人至暴者化爲猛虎心之所變不得不變是故樂者其形和喜者其形逸怒者其形剛憂者其形慼斯亦變化之道也小人由是知顧六尺之軀可以爲龍蛇可以爲金石可以爲草木大哉斯言珠玉悲則雨涙辛則雨涕憤則結癭怒則結疽心之所慾氣之所屬無所一育邪苟爲此正必爲彼是以大人節悲辛誡憤怒得灝氣之門所以收其根知元神之囊所以韜其光若蚌内守若石内藏所以爲珠玉之房蠮螉夫蠮螉之虫孕螟蛉之子傳其情交其精混其氣和其神隨物大小俱得其眞蠢動無定情萬物無定形小人由是知馬可使之飛魚可使之馳土木偶可使之有知嬰兒似乳母斯道不遠矣胡夫胡夫而越婦其子髯面而矬昨禾切足蠻夫而羌婦其子拗鼻而昂首梨接桃而本强者其實毛梅接杏而本强者其實甘以隂孕陽以柔孕剛以曲孕直以短孕長以大孕小以圓孕方以水孕火以丹孕黄小人由是知可以爲金石可以爲珠玉可以爲異類可以爲恠造化之道也隂陽隂陽相摶不根而生芝菌燥濕相育不母而生蝤蠐是故世人體隂陽而根之學燥濕而母之無不濟者小人由是知陶鍊五行火之道也流行無窮水之道也八卦環轉天地之道也神物乃生變化之道也是以君子體物而知身體身而知道夫大人之道幽且微則不知其孰是孰非海魚海魚有以蝦爲目者人皆笑之硃不知古人以囊螢爲燈者又不知晝非日之光則不能馳夜非燭之明則有所欺觀傀儡之假而不自疑嗟朋友之逝而不自悲賢與愚莫知唯抱純白養太玄者不入其機礀松礀松所以能凌霜者藏正氣也美玉所以能犯火者蓄至精也是以大人晝運靈旗夜録神芝覺所不覺思所不思可以冬禦風而不寒夏禦火而不熱故君子藏正氣者可以遠鬼神伏姦佞蓄至精者可以福生靈保富夫何爲多少之故也動靜動靜相磨所以化火也燥濕相蒸所以化水也水火相勃所以化也湯盎投井所以化雹也飮水雨日所以化虹霓也小人由是知隂陽可以召五行可以役天地可以别構日月可以我作有聞是言也必將以爲誕夫民之形也頭圓而足方上動而下靜五行運於内二曜明於外斯亦别構之道也聲氣操琴瑟之音則翛然而閑奏鄭衛之音則樂然而逸解瓴甓之音則背凛森上声檛鼓鼙之音則鴻毛躑躅其感激之道也如是以其和也召陽氣化融風生萬物也其不和也作以氣化厲風辱萬物也氣由聲也聲由氣也氣動則聲發聲發則氣振氣振則風行而萬物變化也是以風雲可以命霜雹可以致鳳凰可以歌熊羆可以舞神明可以友朋樂之術也甚大大同虛含虛神含神氣含氣明含明物含物達此理者情可以通形可以同同於火者化爲火同於水者化爲水同於日月者化爲日月同於金石者化爲金石惟大人無所不同無所不化足可以與虛皇並駕帝師鏡非求鑒於物而物自投之橐非求飽於氣而氣自實之是故鼻以虛受臭耳以虛受聲目以虛受色舌以虛受味所以心同幽冥則物無不受神同虛無則事無不知是以大人奪其機藏其微羽符至怪隂液甚竒可以守國可以救時可以坐爲帝王之師琥珀琥珀不能呼腐芥丹砂不能入燋金磁石不能取憊鐵元氣不能發陶爐所以大人善用五行之精善奪萬物之靈食天人之禄駕風馬一作鳳之榮其道也在忘其形而求其情化書卷之二
