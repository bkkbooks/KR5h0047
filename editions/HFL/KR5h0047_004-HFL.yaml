front:
  text: 化書卷之四
  hash: sha256:55ec8558cd8ab4b060bbc554243ea87509a99db481417f0863908da8a62de594
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0047_HFL_004-001a, image: hfl/1107/1107-070.png}
body:
  text: 仁化得一曠然無爲之謂道道能自守之謂德德生萬物之謂仁仁救安危之謂義義有去就之謂禮禮有變通之謂智智有誠實之謂信通而用之之謂聖道虛無也無以自守故授之以德德清靜也無以自用故授之以仁仁用而萬物生萬物生必有安危故授之以義濟安拔危必有否臧故授之以禮禮秉規持範必有疑滯故授之以智智通則多更故授之以信信者成萬物之道也五行道德者天地也五常者五行也仁發生之謂也故君於木義救難之謂也故君於金禮明白之謂也故君於火智變通之謂也故君於水信整然之謂也故君於土仁不足則義濟之金伐木也義不足則禮濟之火伐金也禮不足則智濟之水伐火也智不足則信濟之土伐水也始則五常相濟之需終則五常相伐之道斯大化之徃也畋漁夫禽獸之於人也何異有巢穴之居有夫婦之配有父子之性有死生之情烏反晡仁也隼憫胎義也蜂有君禮也羊跪乳智也雉不再接信也孰究其道萬物之中五常百行無所不有也而教之爲網罟使之務畋漁且夫焚其巢穴非仁也奪其親愛非義也以斯爲享非禮也教民殘暴非智也使萬物懷疑非信也夫羶臰之慾不止殺害之機不已羽毛雖無言必狀我爲貪狼之與封豕鱗介雖無知必名我爲長鯨之與巨虺也胡爲自安焉得不恥吁直疑自古無君子犧牲犧牲之享羔鴈之薦古之禮也且古之君子非不知情之憂喜聲之哀樂能動天地能感鬼神刀杌前列則憂喜之情可知矣鷹犬齊至則哀樂之聲可知矣以是祭天地以是禱神明天地必不享苟享之必有咎神明必不歆苟歆之必有悔所以知神龍見喪風雲之象也鳳凰來失尊戴之象也麒麟出亡國土之象也觀我之義禽必不義也以彼爲祥禽必不祥也太和非兔狡獵狡也非民詐吏詐也慎勿怨盜賊惟我召慎勿怨叛亂叛亂禀我教不有和睦焉得仇讎不有賞勸焉得鬥爭是以大人無親無踈無愛無惡是謂太和海魚海魚有吐黑水上庇其身而游者人因黑而漁之夫智者多屈辯者多辱明者多蔽勇者多死扃鐍固賊盜喜忌諱嚴敵國幸禁可以越者號也兵可以奪者符也蜀敗於山晋敗於馬夫大人之機道德仁義而已矣神弓譽人者人譽之謗人者人謗之是以君子能罪己斯罪人也不報怨斯報怨也所謂神弓鬼矢不張而發不注而中天得之以假人人得之以假天下救物救物而稱義者人不義之行惠而求報者人不報之民之情也讓之則多爭之則少就之則去避之則來與之則輕惜之則奪是故大義無狀大恩無象大義成不知者荷之大恩就不識者報之書道心不疑乎手手不疑乎筆忘手筆然後知書之道和暢非巧也淳古非朴也柔弱非美也强梁非勇也神之所浴氣之所沐是故點策蓄血氣顧盻含情性無筆墨之跡無機智之狀無剛柔之容無馳騁之象若黃帝之道熙熙然君子之風穆穆然是故觀道者其心樂其神和其氣融其政太平其道無眹夫何故見山思靜見水思動見雲思變見名思貞人之常也鳳鴟鳳不知美鴟不知惡陶唐氏不知聖有苗氏不知暴使陶唐氏恃其聖非聖也有苗氏知其暴不暴也衆人皆能寫人之形而不能寫己之形皆能求人之惡而不能求己之惡皆能知人之禍而不能知己之禍是以大人聽我聲察我色候我形伺我氣然後知人之情僞知人觀其文章則知其人之貴賤焉觀其書篆則知其人之情性焉聞其琴瑟則知其人之道德焉聞其教令則知其人之吉凶焉小人由是知唐堯之容淳淳然虞舜之容熙熙然伯禹之容蕩蕩然殷湯之容堂堂然文王之容巍巍然武王之容諤諤然仲尼之容皇皇然則天下之人可以自知其愚與賢螻蟻螻蟻之有君也一拳之宫與衆處之一塊之臺與衆臨之一粒之食與衆蓄之一蟲之肉與衆咂之一罪無疑與衆戮之故得心相通而後神相通神相通而後氣相通氣相通而後形相通故我病則衆病我痛則衆痛怨何由起叛何由始斯太古之化也歌舞能歌者不能者聽之能舞者不能者觀之巧者不巧者辯之賢者不賢者任之夫養木者必將伐之待士者必將死之網之以冠冕釣之以爵禄若馬駕車輅貴不我得彘食糟糠肥不我有是以大人道不虛貴得不虛守貧有所倚退有所恃退者非樂寒賤而甘委棄躑躅躑躅之酒烏喙之脯莨浪菪蕩之膏冶葛之乳初噉之若芥再噉之若黍復噉之若丸又噉之若脯小人由是知彊弩可以漸引巨鼎可以漸舉水火可以漸習虎兕可以漸侣逆者我所化辱者我所與不應者我所命不臣者我所取所以信柔馬不可馭漸賊不可禦得之以爲萬化之母止鬭止人之鬭者使其鬬抑人之忿者使其忿善救鬭者預其鬭善解忿者濟其忿是故心不可伏而伏之愈亂民不可理而理之愈怨水易動而自清民易變而自平其道也在不逆萬物之情象符術有降萬物之藴毒者則交臂鈎指象之爲符是故若夭矯之勢者鱗之符若飛騰之勢者羽之符若偃蹇之勢者毛之符若拳跼之勢者介之符所以知拱折者人之符夫拱手者人必拱之折腰者人必折之禮之本也而䟽之爲萬象别之爲萬態教之蹈舞非蹈舞也使之禱祝非禱祝也我既寡實彼亦多虛而責人之無清固無情也而罪禮之無驗固無驗也善惡爲惡者畏人識必有識者爲善者欲人知必有不知者是故人不識者謂之太惡人不知者謂之至善好行惠者恩不廣務竒特者功不大善愽奕者智不遠文綺麗者名不乆是以君子惟道是貴惟德是守所以能萬世不朽化書卷之四
