front:
  text: 化書卷之五
  hash: sha256:fb85738644a08a368d48acb20f94338ae9658544ed8f9ac9cd6a936fb50e38d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0047_SJB_005-360307c, image: sjb/36/360307c.png}
body:
  text: 食化七奪一日不食則憊二日不食則病三日不食則死民事之急無甚於食而王者奪其一郷士奪其一吏兵奪其一戰伐奪其一工藝奪其一商賈奪其一道釋之放奪其一稔亦奪其一儉亦奪其一所以蠶吿終而繰葛苧之衣稼云畢而飯橡櫟之實王者之刑理不平斯不平之甚也大人之道救不義斯不義之甚也而行切切之仁慼慼之禮其何以謝之哉巫像爲巫者鬼必附之設像者神必主之蓋樂所饗也戎羯之禮事母而不事父禽獸之情隨母而不隨父凡人之痛呼母而不呼父蓋乳哺之教也虎狼不過於嗜肉蛟龍不過於嗜血而人無所不嗜所以不足則鬥不與則叛鼓天下之怨激烈士之忿食之道非細也養馬養馬者主而牧之者親養子者母而乳之者親君臣非所比而比之者禄也于母非所愛而愛之者哺也駑馬本無知嬰兒本無機而知由此始機由此起所以有愛惡所以有彼此所以稔鬥爭而蓄姦詭絲綸王取其絲吏取其綸王取其綸吏取其綍取之不已至于欺罔欺罔不已至于鞭撻鞭撻不已至于盜竊盜竊不已至于殺害殺害不已至于刑戮欺罔非民愛而裒歛者教之殺害非民願而鞭撻者訓之且夫火將逼而投于水知必不免且貴其緩虎將噬而投于谷知必不可或覬其生以斯爲類悲哉奢僣夫君子不肯告人以飢耻之甚也又不肯矜人以飽愧之甚也既起人之耻愧必激人之怨咎食之害也如是而金籩玉䇺食之飾也鼓鐘戛石食之遊也張組設繡食之感也窮禽竭獸食之暴也滋味厚薄食之忿也貴賤精麤食之爭也慾之愈不止求之愈不已貧食愈不足富食愈不美所以奢僣由兹而起戰伐由兹而始能均其食者天下可以治燔骨嚼燔骨者燋唇爛舌不以爲痛飲醇酎者噦腸嘔胃不以爲苦饞嗜者由忘於痛若飢窘者必輕于性命痛苦可忘無所不欺性命可輕無所不爲是以主者以我慾求人之慾以我飢求人之飢我怒民必怒我怨民必怨能知其道者天下胡爲乎叛食迷民有嗜食而飽死者有婪食而鯁死者有感食而義死者有辱食而憤死者有争食而闘死者人或笑之殊不知官所以務禄禄所以務食賈所以務財財所以務食而官以矯傲讒讟而律死者賈以波濤江海而溺死者而不知所務之端不知得死之由而遷怨於輩流歸咎于江海食之迷也戰欲食之欲也思鹽梅之狀則輒有所吐而不能禁見盤餚之盛則若有所吞而不能遏飢思啖牛渴思飲海故慾之於人也如賊人之於慾也如戰當戰之際錦繡珠玉不足爲富冠冕旌旗不足爲貴金石絲竹不聞其音宫室臺謝不見其麗况民腹常餧民情常迫而諭以仁義其可信乎講以刑故其可畏乎膠竿執膠竿捕黄雀黄雀從而噪之捧盤飱享烏鳥烏鳥從而告之是知至暴者無所不異至食者無所不同故蛇像可以友而群虎兕可以狎而馴四夷可以率而賔異族猶若此况復人之人庚辛庚氏穴池搆竹爲凭檻登之者其聲策䇿焉辛氏穴池橫木爲凭檻登之者其聲堂堂焉二氏俱牧魚於池中每凭檻投餌魚必踴躍而出他日但聞䇿䇿堂堂之聲不投餌亦踴躍而出則是庚氏之魚可名䇿策辛氏之魚可名堂堂食之化也興亡瘡者人之痛火者人之急而民二謂之瘡比人謂之火蓋情有所切也夫鮑魚與足垢無異鮧與足垢無殊而人常食之飽猶若是飢則可知苟其飢也無所不食苟其迫也無所不爲斯所以爲興亡之機雀鼠人之所以惡雀鼠者謂其有寇竊之行鼠雀所以疑人者謂其懷盜賊之心夫上以食而辱下下以食而欺上上不得不惡下下不得不疑上各有所切也夫剜其肌啖其肉不得不哭扼其喉奪其晡不得不怒民之瘠也由剜其肌民之餒也由奪其哺嗚呼惜哉無爲牛可使之駕馬可使之負犬可使之守鷹可使之擊蓋食之所感也獮猴可使之舞鸚鵡可使之語鴟鳶可使之死鬥螻蟻可使之合戰蓋食有所教也魚可使之吞鈎虎可使之入陷鴈可使之觸網敵國可使之自援蓋食有所利也天地可使之交泰神明可使之掖衛高尚可使之屈折夷狄可使之委服蓋食有所奉也故自天子至於庶人暨乎萬族皆可以食而通之我服布素則民自暖我食葵藿則民自飽善用其道者可以肩無爲之化王者獵食者母分乳者子全生者子觸網者母母不知子之所累子不知母之所苦王者衣纓之費盤餚之直歲不過乎百萬而封人之土地與人之富貴百萬之百萬如咂王之肌如飮王之血樂在于下怨在于上利歸于衆咎歸于王夫不自貴天下安敢貴不自富天下安敢富鴟鳶有智者憫鴟鳶之擊腐鼠嗟螻蟻之駕斃蟲謂其爲蟲不若爲人殊不知當歉歲則爭臭憊之屍值嚴圍則食父子之肉斯豺狼之所不忍爲而人爲之則其爲人不若爲蟲是知君無食必不仁臣無食必不義士無食必不禮民無食必不智萬類無食必不信是以食爲五常之本五常爲食之未苟王者能均其衣讓其食則黔黎相悅仁之至也父子相愛義之至也飢飽相讓禮之至也進退相得智之至也許諾相從信之至也教之善也在於食教之不善也在於食其物甚卑其用甚尊其名尤細其化尤大是謂無價之貨化書卷之五
