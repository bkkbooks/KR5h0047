front:
  text: 化書卷之六
  hash: sha256:dd0b886b3c3b9fd613cfbfe2c2b978a135357eb621c6f0cc93f6b67c7203e8c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0047_SJB_006-360310a, image: sjb/36/360310a.png}
body:
  text: 儉化太平夫水火常用之物用之不得其道以至於敗家蓋失於不簡也飲饌常食之物食之不得其道以至于亡身蓋失於不節也夫禮失于奢樂失于淫奢淫若水去不復返議欲救之莫過乎儉儉者均食之道也食均則仁義生仁義生則禮樂序禮樂序則民不怨民不怨則神不怒太平之業也權𢖍服絺綌者不寒而衣之布帛愈寒食藜藿者不飢而飯之黍稷愈飢是故我之情也不可不慮民之心也不可不防凡民之心見負石者則樂於負塗見負塗者則樂於負蒭飢寒無實狀輕重無必然蓋豐儉相形彼我相平我心重則民心重我務輕則民務輕能至於儉者可以與民爲權衡禮道禮貴於盛儉貴於不盛禮貴於備儉貴於不備禮貴於簪紱儉貴於布素禮貴於炳焕儉貴於寂寞富而富之愈不樂貴而貴之愈不美賞而賞之愈不足愛而愛之愈不敬金玉者富之常官爵者貴之常渴飲則甘飢食則香夫惟儉所以能知非食象觀食象者食牛不足覩戴冕者戴冠不足不足有所自不廉有所始是知王好奢則臣不足臣好奢則士不足士好奢則民不足民好奢則天下不足夫天下之物十之王好一民亦一王好五民亦五王好十民亦十以十論之則是十家爲一家十國爲一國十天下爲一天下何不弊之有民情其夫好飲酒者其妻必貧其子好臂鷹者其家必困剩養一僕日飯三甌歲計千甌以一歲計之可享千兵王者歲率是享則必吿勞而聚怨病在於增不在於損王駕牛車民驕於行王居土陛民恥於平杜之於漸化之於儉所以見葛藟不足者則樂然服布素之衣見窳杯而食者則欣然用陶匏之器民之情也慳號世有慳號者人以爲大辱硃不知始得爲純儉之道也於己無所與於民無所取我耕我食我蠶我衣妻子不寒婢僕不飢人不怨之神不罪之故一人知儉則一家富王者知儉則天下富君民君之於民異名而同愛君樂馳騁民亦樂之君喜聲色民亦喜之君好珠玉民亦好之君嗜滋味民亦嗜之其名則異其愛則同所以服布素者愛士之簪組服士之簪組者愛公卿之劒佩服公卿之劒佩者愛王者之旒冕是故王者居兆民所憂之地不得不慮也况金根玉輅奪其貨高臺崇榭奪其力是賈古民之怨是教民之愛所以積薪聚米一歳之計而易金换玉一日之費不得不困不得不儉乳童乳童拱手誰敢戲之豈在乎黼黻也牧竪折腰誰敢背之豈在乎刑政也有賔主之敬則雞黍可以爲大享豈在乎簫韶也有柔淑之態則荆苧可以行婦道豈在乎組繡也而王者之制設溝隍以禦之陳棨戟以衛之蓄粟帛以養之張闌檻以遠之蓋有機於民不得不藏有私於己不得不防夫能張儉之機民自不欺用儉之私我自不疑夫儉者可以爲大人之師化柄儉於聽可以養虛儉於視可以飬神儉於言可以養氣儉於私可以獲富儉於公可以保貴儉於門闥可以無盜賊儉於環衛可以無叛亂儉於職官可以無姦佞儉於嬪嬙可以可以保壽命儉於心可以出生死是知儉可以爲萬化之柄御一王者皆知御一可以治天下也而不知孰謂之一夫萬道皆有一仁亦有一義亦有一禮亦有一智亦有一信亦有一一能貫五五能宗一能得一者天下可以治其道蓋簡而出自簡之其言非玄而入自玄之是故終迷其要竟惑其妙所以議守一之道莫過乎儉儉之所律則仁不蕩義不亂禮不奢智不變信不惑故心有所主而用有所本而民有所賴三皇君儉則臣知足臣儉則士知足士儉則民知足民儉則天下知足天下知足所以無貪財無競名無姦蠹無欺罔無矯佞是故禮義自生刑政自寧溝壘自平甲兵自停遊蕩自耕所以三皇之化行天牧奢者三歲之計一歲之用儉者一歲之計三歲之用至奢者猶不及至儉者尚有餘奢者富不足儉者貧有餘奢者心常貧儉者心常富奢者好親人所以多過儉者能遠人所以寡祻奢者事君必有所辱儉者事君必保其禄奢者多憂儉者多福能終其儉者可以爲天下之牧雕籠懸雕籠食玉粒養黄雀黄雀終不樂垂禮樂設賞罰教生民生民終不泰夫心不可安而自安之道不可守而自守之民不可化而自化之所以儉於臺榭則民力有餘儉於寳貨則民財有餘儉於戰伐則民時有餘不與之由與之也不取之由取之也海伯亡魚不出於海國君亡馬不出於國禮要夫禮者道出於君而君由不知事出於職而職由不明儒者棲山林敬師友窮禮樂講本末暨乎見羽葆車輅之狀鐘鼓簫韶之作則矍然若鹿怡然若豕若醉於酒若溺於水莫知道之本莫窮禮之㫖謂弓爲弧則民不知矣謂馬爲駟則民莫信矣所以數亂於多不亂於少禮惑於大不惑於小能師於儉者可以得其要清靜奢者好動儉者好靜奢者好難儉者好易奢者好繁儉者好簡奢者好逸樂儉者好恬淡有保一器畢生無璺音問破也者有挂一裘十年不敝者斯人也可以親百姓可以司粟帛可以掌符璽可以即清靜之道損益夫仁不儉有不仁義不儉有不義禮不儉有非禮智不儉有無智信不儉有不信所以知儉爲五常之本五常爲儉之末夫禮者益之道也儉者損之道也益者損之㫖損者益之理禮過則淫儉過則朴自古及今未有亡於儉者也解惑謙者人所尊儉者人所寳使之謙必不謙使之儉必不儉我謙則民自謙我儉則民自儉機在此不在彼柄在君不在人惡行之者惑是故爲之文化書卷之六終
